services:
  - type: web
    name: minime-api
    runtime: node
    plan: free
    rootDir: techletter-backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: postgres
      - key: DB_SSL
        value: "true"
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: PORTFOLIO_DEMO_ENABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://minime-eight.vercel.app
      - key: CORS_ORIGINS
        value: https://minime-eight.vercel.app
      - key: PUBLIC_BASE_URL
        value: https://minime-api.onrender.com
